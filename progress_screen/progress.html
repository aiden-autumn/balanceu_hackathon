<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress Screen</title>
    <link rel="stylesheet" href="progress.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1 class="title">Your Progress</h1>

            <!-- This Week Section -->
            <div class="section">
                <h2 class="section-title">This Week</h2>
                <div class="activity-list"></div>
            </div>

            <!-- Pie Chart -->
            <div class="section">
                <div class="chart-container">
                    <canvas id="pieChart" width="200" height="200"></canvas>
                    <div class="legend"></div>
                </div>
            </div>

            <!-- Weekly Goal Section -->
            <div class="section">
                <h2 class="section-title">Weekly Goal</h2>
                <div class="chart-container">
                    <div class="progress-bar-container">
                        <div class="progress-bar-fill weekly-bar"></div>
                    </div>
                    <div class="progress-text weekly-label"></div>
                </div>
            </div>

            <!-- Awards Section -->
            <div class="section">
                <h2 class="section-title">Awards</h2>
                <div class="awards-grid" id="awardsGrid"></div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <button class="nav-item" onclick="goToPage('/home_screen/home.html')">
            <div class="nav-icon">🏠</div>
            <div class="nav-label">Home</div>
        </button>
        <button class="nav-item" onclick="goToPage('/log_screen/log.html')">
            <div class="nav-icon">📝</div>
            <div class="nav-label">Log</div>
        </button>
        <button class="nav-item" onclick="goToPage('/quest_screen/quest.html')">
            <div class="nav-icon">⚔️</div>
            <div class="nav-label">Side Quest</div>
        </button>
        <button class="nav-item" onclick="goToPage('/grass_screen/grass.html')">
            <div class="nav-icon">🌱</div>
            <div class="nav-label">Touch Grass</div>
        </button>
        <button class="nav-item active" onclick="goToPage('/progress_screen/progress.html')">
            <div class="nav-icon">📊</div>
            <div class="nav-label">Progress</div>
        </button>
        <button class="nav-item" onclick="goToPage('/profile_screen/profile.html')">
            <div class="nav-icon">🧑‍💻</div>
            <div class="nav-label">Profile</div>
        </button>
    </div>

    <script src="progress.js"></script>
</body>
</html>
