
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Screen</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="card-header">
            <h1 class="card-title">Welcome!</h1>
            <p class="card-description">Tell us a bit about yourself to get started</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="firstName">First Name</label>
                <input 
                    type="text" 
                    id="firstName" 
                    placeholder="Enter your first name" 
                    required
                >
            </div>

            <div class="form-group">
                <div class="hobbies-header">
                    <label>Select Your Hobbies</label>
                    <span class="counter" id="counter">0/3 selected</span>
                </div>
                <div class="hobbies-grid" id="hobbiesGrid"></div>
                <p class="warning-text" id="warningText" style="display: none;">
                    Maximum of 3 hobbies selected
                </p>
            </div>

            <button type="submit" id="submitBtn" disabled>Continue</button>
        </form>
    </div>

    <script src="main.js"></script>
</body>
</html>
